<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Writing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/theme.css">
  <link rel="stylesheet" href="writing.css">
</head>
<body>

  <aside class="side">
    <div class="side-head">
      <div class="side-title">Local Writing</div>
      <div class="side-sub">Saves to device, not the cloud</div>
    </div>
    <div class="side-section">Chapters</div>
    <div class="chapter-list" id="chapterList"></div>
    <button class="add-chapter" id="addChapter">+ New chapter</button>
  </aside>

  <main class="editor-wrap">
    <div class="toolbar">
      <button data-cmd="bold" title="Bold"><b>B</b></button>
      <button data-cmd="italic" title="Italic"><i>I</i></button>
      <button data-cmd="underline" title="Underline"><u>U</u></button>
      <span class="tb-sep"></span>
      <button data-block="h2" title="Heading">H</button>
      <button data-cmd="insertUnorderedList" title="Bullet list">&bull;</button>
      <span class="tb-spacer"></span>
      <span class="wordcount" id="wordCount">0 words</span>
      <span class="savestate" id="saveState"></span>
    </div>
    <div class="paper">
      <h1 class="chapter-title" id="chapterTitle" contenteditable="true" spellcheck="true"></h1>
      <div class="editor" id="editor" contenteditable="true" spellcheck="true"></div>
    </div>
  </main>

  <script src="writing.js"></script>
</body>
</html>
