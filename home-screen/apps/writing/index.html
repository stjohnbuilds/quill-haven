<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Writing</title>
  <link rel="stylesheet" href="../../shared/theme.css?v=16">
  <link rel="stylesheet" href="writing.css?v=18">
</head>
<body>

  <!-- Collapsed: a little faded quill you tap to bring the panel back -->
  <button class="nav-quill" id="navQuill" title="Show panel" aria-label="Show panel"></button>

  <!-- ── Side panel ── -->
  <aside class="side" id="side">
    <div class="side-top">
      <div class="tabs">
        <button class="tab active" data-tab="notes" type="button">Notes</button>
        <button class="tab" data-tab="projects" type="button">Projects</button>
        <button class="tab tab-trash" data-tab="trash" type="button" hidden title="Trash">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          <span class="trash-count" id="trashCount" hidden></span>
        </button>
      </div>
      <button class="side-download" id="downloadBtn" type="button" title="Download project" aria-label="Download project" hidden>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
      </button>
    </div>

    <div class="side-scroll">
      <div class="panel" id="notesPanel"></div>
      <div class="panel" id="projectsPanel" hidden></div>
      <div class="panel" id="trashPanel" hidden></div>
    </div>

    <div class="side-foot" id="sideFoot"></div>

    <!-- Faint collapse arrow on the panel's right edge, halfway down -->
    <button class="edge-collapse" id="collapseBtn" type="button" title="Hide panel" aria-label="Hide panel">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
  </aside>

  <!-- Download dropdown (where to save) -->
  <div class="dl-menu" id="dlMenu" hidden>
    <button class="dl-item" data-dest="device" type="button">
      <span class="dl-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 18v3"/></svg></span>
      <span class="dl-text"><span class="dl-name">This device</span><span class="dl-sub">Word file (.rtf) — also saved to Files</span></span>
    </button>
    <button class="dl-item" data-dest="drive" type="button">
      <span class="dl-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4l5 8-5 8"/><path d="M17 4l-5 8 5 8"/><path d="M2 20h20"/></svg></span>
      <span class="dl-text"><span class="dl-name">Google Drive</span><span class="dl-sub">Off-device backup</span></span>
    </button>
  </div>

  <!-- ── Editor ── -->
  <main class="editor-wrap">
    <div class="pill-toolbar" id="toolbar">
      <button data-cmd="bold" type="button" title="Bold"><b>B</b></button>
      <button data-cmd="italic" type="button" title="Italic"><i>I</i></button>
      <button data-cmd="underline" type="button" title="Underline"><u>U</u></button>
      <button data-cmd="strikeThrough" type="button" title="Strikethrough"><s>S</s></button>
      <button class="hl-btn" id="hlBtn" type="button" title="Highlight">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </button>
      <span class="tb-sep"></span>
      <span class="tb-spacer"></span>
      <span class="wordcount" id="wordCount">0 words</span>
      <span class="savestate" id="saveState"></span>
    </div>

    <!-- highlight colour popover -->
    <div class="hl-menu" id="hlMenu" hidden></div>

    <div class="paper" id="paper">
      <div class="doc" id="doc">
        <div class="doc-header"    id="docHeader"    contenteditable="true" spellcheck="true" data-ph="Title"></div>
        <div class="doc-subheader" id="docSubheader" contenteditable="true" spellcheck="true" data-ph="Subtitle"></div>
        <div class="editor"        id="editor"        contenteditable="true" spellcheck="true" data-ph="Start writing…"></div>
      </div>
      <div class="empty-state" id="emptyState" hidden>
        <div class="empty-quill"></div>
        <p id="emptyText">Pick something from the panel, or make a new one.</p>
      </div>
    </div>
  </main>

  <!-- Undo toast (mounted on demand) -->

  <script src="../../shared/confirm.js?v=2"></script>
  <script src="writing.js?v=18"></script>
</body>
</html>
