<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Files</title>
  <link rel="stylesheet" href="../../shared/theme.css?v=2">
  <link rel="stylesheet" href="files.css?v=5">
</head>
<body>

  <aside class="side">
    <div class="side-head">
      <div class="side-title">Files</div>
      <div class="side-sub">On this device</div>
    </div>
    <nav class="folders" id="folders"></nav>
    <div class="side-note">Downloads &amp; a plugged-in USB show up here once Quill Haven is installed on your device.</div>
  </aside>

  <main class="main">
    <div class="bar">
      <div class="bar-title" id="barTitle">Documents</div>
      <span class="bar-hint" id="barHint" hidden></span>
      <button class="bar-action" id="barAction" type="button" hidden></button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>
      <div class="empty-icon" id="emptyIcon"></div>
      <p id="emptyText"></p>
    </div>
  </main>

  <input type="file" id="picInput" accept="image/*" hidden>

  <script src="../../shared/confirm.js?v=2"></script>
  <script src="files.js?v=7"></script>
</body>
</html>
